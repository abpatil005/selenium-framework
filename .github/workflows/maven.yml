name: Selenium CI

on:
  push:
    branches:
      - abpati1005-stage-selenium-framework
      - master

  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: selenium-framework   # ✅ FIX

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Debug folder structure
        run: ls -R

      - name: Build with Maven
        run: mvn clean install

      - name: Run Tests
        run: mvn test
