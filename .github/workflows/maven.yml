name: Selenium CI

on:
  push:
    branches:
      - master
      - abpati1005-stage-selenium-framework

  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and Run Tests
        working-directory: selenium-framework
        run: mvn clean test

      # Upload TestNG / Surefire reports (CI artifacts)
      - name: Upload TestNG Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestNG-Reports
          path: selenium-framework/target/surefire-reports/

      # Upload Extent reports (CD)
      - name: Upload Extent Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Extent-Reports
          path: selenium-framework/reports/
